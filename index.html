<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생건강체력평가(PAPS) 데이터베이스 연동 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .grade-badge { transition: all 0.3s ease; }
        
        .grade-1 { background-color: #dbeafe; color: #1e3a8a; border-color: #bfdbfe; }
        .grade-2 { background-color: #d1fae5; color: #065f46; border-color: #a7f3d0; }
        .grade-3 { background-color: #fef3c7; color: #92400e; border-color: #fde68a; }
        .grade-4 { background-color: #ffedd5; color: #9a3412; border-color: #fed7aa; }
        .grade-5 { background-color: #fee2e2; color: #991b1b; border-color: #fecaca; }

        /* 모바일 환경에서 입력창 포커스 시 확대 방지 (iOS) */
        input[type="number"], input[type="text"], select { font-size: 16px; }
        
        /* 로딩 오버레이 */
        #loadingOverlay { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- 데이터베이스 로딩 오버레이 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white bg-opacity-80 flex flex-col items-center justify-center z-50">
        <i class="fas fa-database text-blue-500 text-5xl mb-4 animate-bounce"></i>
        <h2 class="text-xl font-bold text-gray-800 mb-2">평가 기준 데이터베이스 접속 중...</h2>
        <p class="text-gray-500 text-sm">선생님의 구글 시트에서 최신 기준표를 불러오고 있습니다.</p>
    </div>

    <!-- 커스텀 알림 모달 -->
    <div id="customModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center transform scale-100">
            <div class="text-red-500 mb-3"><i class="fas fa-exclamation-circle text-4xl"></i></div>
            <p id="customModalMsg" class="mb-5 text-gray-800 font-medium"></p>
            <button type="button" onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">확인</button>
        </div>
    </div>

    <!-- 종합 등급 팝업 모달 (제출 시 팝업) -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 transition-opacity">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center transform scale-100">
            <div class="text-5xl mb-4">🏆</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">PAPS 종합 평가 결과</h2>
            <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 mb-6 mt-4 shadow-inner">
                <p class="text-sm font-bold text-gray-600 mb-2">합산 점수 및 종합 등급</p>
                <div class="flex items-center justify-center space-x-2">
                    <span id="popupTotalScore" class="text-4xl font-black text-blue-600"></span>
                    <span class="text-lg font-bold text-gray-700">점</span>
                </div>
                <div class="mt-3">
                    <span id="popupOverallGrade" class="text-2xl font-black inline-block border"></span>
                </div>
            </div>
            <button type="button" onclick="confirmAndSubmit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg text-lg">확인 및 최종 전송하기</button>
            <button type="button" onclick="closeResultModal()" class="w-full mt-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl transition">취소 (기록 수정하기)</button>
        </div>
    </div>

    <!-- 상단 헤더 -->
    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">🏃‍♂️ 나의 PAPS 기록 입력</h1>
        <span id="dbStatus" class="text-xs bg-blue-800 px-2 py-1 rounded-full"><i class="fas fa-circle-notch fa-spin mr-1"></i>DB연결중</span>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        
        <form id="papsForm" class="bg-white rounded-2xl shadow-lg p-6 space-y-8">
            
            <!-- 1. 학생 정보 섹션 -->
            <div>
                <div class="flex justify-between items-end border-b-2 border-blue-500 pb-2 mb-4">
                    <h2 class="text-lg font-bold text-gray-800"><i class="fas fa-user-graduate mr-2 text-blue-500"></i>1. 기본 정보 (먼저 선택)</h2>
                    <span id="saveIndicator" class="text-xs text-gray-400 hidden"><i class="fas fa-save mr-1"></i>자동저장됨</span>
                </div>
                <div class="space-y-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">소속 (학년 / 반 / 번호)</label>
                        <div class="flex space-x-2">
                            <select id="grade" required class="w-1/3 border-gray-300 rounded-lg p-3 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500 transition text-center input-save">
                                <option value="" disabled selected>학년</option>
                                <option value="4">4학년</option>
                                <option value="5">5학년</option>
                                <option value="6">6학년</option>
                            </select>
                            <input type="number" id="classNum" required min="1" class="w-1/3 border-gray-300 rounded-lg p-3 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500 transition text-center input-save" placeholder="반">
                            <input type="number" id="studentNum" required min="1" class="w-1/3 border-gray-300 rounded-lg p-3 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500 transition text-center input-save" placeholder="번호">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                        <input type="text" id="studentName" required class="w-full border-gray-300 rounded-lg p-3 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500 transition input-save" placeholder="이름을 입력하세요">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">성별</label>
                    <div class="flex space-x-4">
                        <label class="flex-1 text-center border rounded-lg p-3 cursor-pointer has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 transition">
                            <input type="radio" name="gender" value="남자" required class="hidden input-save">
                            <span class="font-medium text-gray-700">남학생</span>
                        </label>
                        <label class="flex-1 text-center border rounded-lg p-3 cursor-pointer has-[:checked]:bg-red-50 has-[:checked]:border-red-500 transition">
                            <input type="radio" name="gender" value="여자" required class="hidden input-save">
                            <span class="font-medium text-gray-700">여학생</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 2. 신체 정보 섹션 (BMI) -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                <h2 class="text-lg font-bold text-gray-800 pb-2 mb-3"><i class="fas fa-weight-scale mr-2 text-green-500"></i>2. 체격 정보 (BMI)</h2>
                <div class="grid grid-cols-2 gap-4 mb-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">키 (cm)</label>
                        <input type="number" id="height" step="0.1" class="w-full border-gray-300 rounded-lg p-3 bg-white border focus:ring-green-500 focus:border-green-500 transition text-center input-save" placeholder="150.5">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">몸무게 (kg)</label>
                        <input type="number" id="weight" step="0.1" class="w-full border-gray-300 rounded-lg p-3 bg-white border focus:ring-green-500 focus:border-green-500 transition text-center input-save" placeholder="45.2">
                    </div>
                </div>
                <button type="button" onclick="checkBMI()" class="w-full bg-green-100 hover:bg-green-200 text-green-800 font-bold py-2 rounded-lg transition border border-green-200">
                    체질량지수(BMI) 결과 보기
                </button>
                <div id="res-bmi" class="hidden mt-3 p-3 text-center rounded-lg border font-bold text-lg bg-white"></div>
            </div>

            <!-- 3. 체력 측정 결과 섹션 -->
            <div>
                <h2 class="text-lg font-bold text-gray-800 border-b-2 border-orange-500 pb-2 mb-4"><i class="fas fa-running mr-2 text-orange-500"></i>3. 종목별 기록 측정</h2>
                
                <div class="space-y-6">
                    <!-- 심폐지구력 -->
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-2">왕복오래달리기 <span class="text-xs font-normal text-gray-500">(회)</span></label>
                        <div class="flex space-x-2">
                            <input type="number" id="shuttleRun" class="flex-1 border-gray-300 rounded-lg p-3 bg-white border focus:ring-orange-500 focus:border-orange-500 transition text-center input-save" placeholder="기록 입력">
                            <button type="button" onclick="checkSingleEvent('shuttleRun', '왕복오래달리기')" class="bg-orange-100 hover:bg-orange-200 text-orange-800 border border-orange-200 px-4 rounded-lg font-bold transition whitespace-nowrap">결과 보기</button>
                        </div>
                        <div id="res-shuttleRun" class="hidden mt-3 p-3 text-center rounded-lg border font-bold text-lg bg-white"></div>
                    </div>
                    
                    <!-- 유연성 -->
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-2">앉아윗몸앞으로굽히기 <span class="text-xs font-normal text-gray-500">(cm)</span></label>
                        <div class="flex space-x-2">
                            <input type="number" id="sitAndReach" step="0.1" class="flex-1 border-gray-300 rounded-lg p-3 bg-white border focus:ring-orange-500 focus:border-orange-500 transition text-center input-save" placeholder="기록 입력">
                            <button type="button" onclick="checkSingleEvent('sitAndReach', '앉아윗몸앞으로굽히기')" class="bg-orange-100 hover:bg-orange-200 text-orange-800 border border-orange-200 px-4 rounded-lg font-bold transition whitespace-nowrap">결과 보기</button>
                        </div>
                        <div id="res-sitAndReach" class="hidden mt-3 p-3 text-center rounded-lg border font-bold text-lg bg-white"></div>
                    </div>

                    <!-- 근력 -->
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-2">악력 <span class="text-xs font-normal text-gray-500">(kg)</span></label>
                        <div class="flex space-x-2">
                            <input type="number" id="gripStrength" step="0.1" class="flex-1 border-gray-300 rounded-lg p-3 bg-white border focus:ring-orange-500 focus:border-orange-500 transition text-center input-save" placeholder="기록 입력">
                            <button type="button" onclick="checkSingleEvent('gripStrength', '악력')" class="bg-orange-100 hover:bg-orange-200 text-orange-800 border border-orange-200 px-4 rounded-lg font-bold transition whitespace-nowrap">결과 보기</button>
                        </div>
                        <div id="res-gripStrength" class="hidden mt-3 p-3 text-center rounded-lg border font-bold text-lg bg-white"></div>
                    </div>

                    <!-- 순발력 -->
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-2">제자리멀리뛰기 <span class="text-xs font-normal text-gray-500">(cm)</span></label>
                        <div class="flex space-x-2">
                            <input type="number" id="broadJump" step="0.1" class="flex-1 border-gray-300 rounded-lg p-3 bg-white border focus:ring-orange-500 focus:border-orange-500 transition text-center input-save" placeholder="기록 입력">
                            <button type="button" onclick="checkSingleEvent('broadJump', '제자리멀리뛰기')" class="bg-orange-100 hover:bg-orange-200 text-orange-800 border border-orange-200 px-4 rounded-lg font-bold transition whitespace-nowrap">결과 보기</button>
                        </div>
                        <div id="res-broadJump" class="hidden mt-3 p-3 text-center rounded-lg border font-bold text-lg bg-white"></div>
                    </div>
                </div>
            </div>

            <!-- 최종 제출 버튼 -->
            <div class="pt-4">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:scale-105 flex justify-center items-center">
                    <i class="fas fa-cloud-upload-alt mr-2 text-xl"></i>
                    <span class="text-lg">모든 기록 입력 완료 / 최종 제출</span>
                </button>
                <p class="text-xs text-center text-gray-500 mt-3">작성 중인 내용은 스마트폰에 자동 저장됩니다.</p>
            </div>
        </form>

        <!-- 최종 완료 메시지 표시 영역 -->
        <div id="finalSection" class="hidden mt-8 bg-white rounded-2xl shadow-lg p-8 text-center animate-fade-in">
            <div class="text-5xl mb-4">🏆</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">입력이 완료되었습니다!</h2>
            <p id="finalGreeting" class="text-gray-600 mb-6"></p>

            <!-- 제출 후 요약 뱃지 -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6">
                <p class="text-sm font-bold text-gray-600 mb-2">PAPS 종합 평가 결과</p>
                <div class="flex items-center justify-center space-x-2">
                    <span id="finalTotalScore" class="text-3xl font-black text-blue-600"></span>
                    <span class="text-lg font-bold text-gray-700">점 /</span>
                    <span id="finalOverallGrade" class="text-2xl font-black"></span>
                </div>
            </div>

            <div id="saveStatus" class="text-sm font-medium p-3 rounded-lg bg-gray-100"></div>

            <button type="button" onclick="resetForm()" class="mt-8 w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 rounded-xl transition">
                다른 학생 기록 입력하기
            </button>
        </div>

    </main>

    <script>
        // ==========================================
        // ⚠️ 구글 시트 연동 웹훅 URL
        // ==========================================
        const GOOGLE_SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzt9LIBsOxYvtLzkZDTtYgP4P6HGEE3-XyRJgTYVytUb7z86Wub8JDRbZOQOD8aQ2Zbvg/exec"; 

        // 구글 시트에서 불러올 데이터베이스 저장소
        let papsStandardsDB = [];

        // ==========================================
        // 자동 임시 저장 (Local Storage) 기능
        // ==========================================
        const SAVE_KEY = 'paps_temp_data';

        function saveToLocal() {
            const tempObj = {};
            const inputs = document.querySelectorAll('.input-save');
            
            inputs.forEach(input => {
                if(input.type === 'radio') {
                    if(input.checked) tempObj[input.name] = input.value;
                } else {
                    tempObj[input.id] = input.value;
                }
            });

            localStorage.setItem(SAVE_KEY, JSON.stringify(tempObj));
            
            // 저장 알림 표시
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.remove('hidden');
            setTimeout(() => { indicator.classList.add('hidden'); }, 2000);
        }

        function loadFromLocal() {
            const saved = localStorage.getItem(SAVE_KEY);
            if(saved) {
                const tempObj = JSON.parse(saved);
                const inputs = document.querySelectorAll('.input-save');
                
                inputs.forEach(input => {
                    if(input.type === 'radio') {
                        if(tempObj[input.name] === input.value) input.checked = true;
                    } else if (tempObj[input.id]) {
                        input.value = tempObj[input.id];
                    }
                });
            }
        }

        function clearLocalData() {
            localStorage.removeItem(SAVE_KEY);
        }

        // 입력값이 변할 때마다 저장
        document.querySelectorAll('.input-save').forEach(input => {
            input.addEventListener('change', saveToLocal);
            input.addEventListener('keyup', saveToLocal);
        });


        // ==========================================
        // 초기화 및 DB 불러오기
        // ==========================================
        window.addEventListener('DOMContentLoaded', async () => {
            // 저장된 데이터 불러오기
            loadFromLocal();

            if (!GOOGLE_SHEET_WEBHOOK_URL) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('dbStatus').innerHTML = '<i class="fas fa-eye text-yellow-300 mr-1"></i>미리보기';
                
                const banner = document.createElement('div');
                banner.className = 'bg-yellow-50 border-l-4 border-yellow-400 text-yellow-800 p-4 mb-6 rounded-lg text-sm';
                banner.innerHTML = '<p class="font-bold mb-1"><i class="fas fa-info-circle mr-1"></i> 현재는 디자인 미리보기 상태입니다.</p><p>코드 편집기에서 <code class="bg-yellow-100 px-1 rounded">GOOGLE_SHEET_WEBHOOK_URL</code>에 구글 시트 주소를 넣기 전까지는 <b>결과 확인 및 저장이 작동하지 않습니다.</b> 앱의 화면 구성과 자동 임시 저장 기능을 테스트해보세요!</p>';
                document.getElementById('papsForm').prepend(banner);
                return;
            }

            try {
                const response = await fetch(GOOGLE_SHEET_WEBHOOK_URL + "?action=getStandards");
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    papsStandardsDB = result.data; 
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('dbStatus').innerHTML = '<i class="fas fa-check-circle text-green-300 mr-1"></i>DB 연결됨';
                    document.getElementById('dbStatus').classList.replace('bg-blue-800', 'bg-green-700');
                } else {
                    throw new Error("데이터가 비어있거나 올바르지 않습니다.");
                }
            } catch (error) {
                console.error("DB 로딩 에러:", error);
                document.getElementById('dbStatus').innerHTML = '<i class="fas fa-times-circle text-red-300 mr-1"></i>DB 오류';
                document.getElementById('loadingOverlay').innerHTML = `
                    <i class="fas fa-bomb text-red-500 text-5xl mb-4"></i>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">데이터베이스 연결 실패</h2>
                    <p class="text-gray-500 text-sm text-center px-6">구글 시트 URL이 맞는지, 또는 Apps Script 배포 권한이 '모든 사용자'로 되어 있는지 확인해주세요.</p>
                `;
            }
        });

        // ==========================================
        // 공통 UI 함수
        // ==========================================
        function showModal(msg) {
            document.getElementById('customModalMsg').innerText = msg;
            document.getElementById('customModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('customModal').classList.add('hidden');
        }

        function getContext() {
            const grade = document.getElementById('grade').value;
            const genderNode = document.querySelector('input[name="gender"]:checked');
            
            if (!grade || !genderNode) {
                showModal("먼저 '학년'과 '성별'을 선택해야 정확한 기준을 조회할 수 있어요!");
                return null;
            }
            return { gradeStr: grade + '학년', genderStr: genderNode.value };
        }

        // ==========================================
        // 핵심: DB 대조 로직 
        // ==========================================
        function findGradeAndScoreFromDB(gradeStr, genderStr, eventName, val) {
            if (papsStandardsDB.length === 0) {
                 return { error: "구글 시트가 연결되지 않아 계산할 수 없습니다." };
            }

            const matches = papsStandardsDB.filter(r => 
                r['학년'] === gradeStr && 
                r['성별'] === genderStr && 
                r['평가종목'] === eventName
            );

            if (matches.length === 0) {
                return { error: `구글 시트에 [${gradeStr} ${genderStr} ${eventName}] 기준이 없습니다.` };
            }

            for(let r of matches) {
                const min = parseFloat(r['시작']);
                const max = parseFloat(r['종료']);
                
                if(val >= min && val <= max) {
                    let rawGrade = r['등급']; 
                    let parsedGrade = parseFloat(rawGrade);
                    
                    return {
                        success: true,
                        gradeDisplay: isNaN(parsedGrade) ? rawGrade : `${parsedGrade}등급`,
                        score: parseFloat(r['점수']) || 0
                    };
                }
            }

            return { error: "입력한 기록이 기준표의 어떤 구간에도 포함되지 않습니다. (오타 확인)" };
        }

        function renderResultBadge(elementId, resultObj, prefix = '') {
            const el = document.getElementById(elementId);
            if(resultObj.error) {
                el.innerHTML = `<span class="text-red-500 text-sm"><i class="fas fa-exclamation-triangle"></i> ${resultObj.error}</span>`;
                el.className = `mt-3 p-3 text-center rounded-lg border border-red-200 bg-red-50 animate-fade-in block`;
            } else {
                let badgeColor = "text-blue-700 bg-blue-50 border-blue-200"; 
                if(resultObj.gradeDisplay.includes('1등급')) badgeColor = "text-blue-800 bg-blue-100 border-blue-300";
                if(resultObj.gradeDisplay.includes('5등급') || resultObj.gradeDisplay.includes('비만')) badgeColor = "text-red-800 bg-red-100 border-red-300";

                el.innerHTML = `${prefix} <span class="text-xl">${resultObj.gradeDisplay}</span> <span class="text-gray-500 font-medium text-sm ml-1">(${resultObj.score}점)</span>`;
                el.className = `mt-3 p-3 text-center rounded-lg border font-bold ${badgeColor} animate-fade-in block`;
            }
        }

        // ==========================================
        // 개별 종목 확인 버튼 동작
        // ==========================================
        function checkBMI() {
            const ctx = getContext();
            if (!ctx) return;

            const h = parseFloat(document.getElementById('height').value);
            const w = parseFloat(document.getElementById('weight').value);

            if (!h || !w || h <= 0 || w <= 0) {
                showModal("키와 몸무게를 정확히 입력해주세요.");
                return;
            }

            const heightM = h / 100;
            const bmiValue = parseFloat((w / (heightM * heightM)).toFixed(1));
            
            const result = findGradeAndScoreFromDB(ctx.gradeStr, ctx.genderStr, '체질량지수', bmiValue);
            renderResultBadge('res-bmi', result, `BMI: ${bmiValue} ➜`);
        }

        function checkSingleEvent(eventId, eventName) {
            const ctx = getContext();
            if (!ctx) return;

            const val = parseFloat(document.getElementById(eventId).value);
            if (isNaN(val)) {
                showModal(`${eventName} 기록을 입력해주세요.`);
                return;
            }

            const result = findGradeAndScoreFromDB(ctx.gradeStr, ctx.genderStr, eventName, val);
            renderResultBadge(`res-${eventId}`, result);
        }

        // ==========================================
        // 전체 제출 및 저장 로직 (팝업 추가됨)
        // ==========================================
        let pendingFinalData = null; // 제출 전 데이터를 임시 보관할 변수

        document.getElementById('papsForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if(papsStandardsDB.length === 0) {
                showModal("데이터베이스가 연결되지 않아 제출할 수 없습니다. 시트 연동 URL을 확인해주세요.");
                return;
            }

            const ctx = getContext();
            if (!ctx) return;

            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('classNum').value;
            const studentNum = document.getElementById('studentNum').value;
            const studentName = document.getElementById('studentName').value;
            const genderNode = document.querySelector('input[name="gender"]:checked');
            
            const h = parseFloat(document.getElementById('height').value);
            const w = parseFloat(document.getElementById('weight').value);
            const sr = parseFloat(document.getElementById('shuttleRun').value);
            const sar = parseFloat(document.getElementById('sitAndReach').value);
            const gs = parseFloat(document.getElementById('gripStrength').value);
            const bj = parseFloat(document.getElementById('broadJump').value);

            if (isNaN(h) || isNaN(w) || isNaN(sr) || isNaN(sar) || isNaN(gs) || isNaN(bj)) {
                showModal("모든 항목을 빠짐없이 입력해야 합산 결과를 확인할 수 있습니다.");
                return;
            }

            // 점수 합산을 위한 재계산 로직
            const heightM = h / 100;
            const bmiValue = parseFloat((w / (heightM * heightM)).toFixed(1));

            const bmiRes = findGradeAndScoreFromDB(ctx.gradeStr, ctx.genderStr, '체질량지수', bmiValue);
            const srRes = findGradeAndScoreFromDB(ctx.gradeStr, ctx.genderStr, '왕복오래달리기', sr);
            const sarRes = findGradeAndScoreFromDB(ctx.gradeStr, ctx.genderStr, '앉아윗몸앞으로굽히기', sar);
            const gsRes = findGradeAndScoreFromDB(ctx.gradeStr, ctx.genderStr, '악력', gs);
            const bjRes = findGradeAndScoreFromDB(ctx.gradeStr, ctx.genderStr, '제자리멀리뛰기', bj);

            // 하나라도 점수 환산에 오류가 있으면 중단
            if (bmiRes.error || srRes.error || sarRes.error || gsRes.error || bjRes.error) {
                showModal("입력된 기록 중 기준표 범위를 벗어난 값이 있어 점수를 계산할 수 없습니다. 오타가 없는지 확인해주세요.");
                return;
            }

            const totalScore = bmiRes.score + srRes.score + sarRes.score + gsRes.score + bjRes.score;

            // 종합 등급 판정 (1등급 90점 이상, 2등급 80점 이상)
            let overallGrade = 5;
            if (totalScore >= 90) overallGrade = 1;
            else if (totalScore >= 80) overallGrade = 2;
            else if (totalScore >= 60) overallGrade = 3;
            else if (totalScore >= 40) overallGrade = 4;
            else overallGrade = 5;

            pendingFinalData = {
                studentId: `${grade}학년 ${classNum}반 ${studentNum}번`,
                studentName: studentName,
                gender: genderNode.value,
                height: h, weight: w,
                shuttleRun: sr, sitAndReach: sar, gripStrength: gs, broadJump: bj,
                totalScore: totalScore,
                overallGrade: overallGrade
            };

            // 팝업 모달에 점수 및 등급 표시
            document.getElementById('popupTotalScore').innerText = totalScore;
            const popupGradeEl = document.getElementById('popupOverallGrade');
            popupGradeEl.innerText = overallGrade + '등급';
            popupGradeEl.className = `text-2xl font-black grade-${overallGrade} px-3 py-2 rounded-lg border-2`;

            // 팝업 띄우기
            document.getElementById('resultModal').classList.remove('hidden');
        });

        // 팝업 닫기 버튼 (기록 수정하기)
        function closeResultModal() {
            document.getElementById('resultModal').classList.add('hidden');
        }

        // 팝업에서 [확인 및 최종 전송하기] 버튼 클릭 시
        function confirmAndSubmit() {
            document.getElementById('resultModal').classList.add('hidden'); // 팝업 숨기기
            
            document.getElementById('papsForm').classList.add('hidden'); // 폼 숨기기
            document.getElementById('finalSection').classList.remove('hidden'); // 완료 화면 보이기
            
            document.getElementById('finalGreeting').innerHTML = `<span class="font-bold text-blue-600">${pendingFinalData.studentId} ${pendingFinalData.studentName}</span> 학생의 데이터가 제출되었습니다.`;
            
            // 완료 화면의 종합 요약 뱃지에도 점수/등급 렌더링
            document.getElementById('finalTotalScore').innerText = pendingFinalData.totalScore;
            const finalGradeEl = document.getElementById('finalOverallGrade');
            finalGradeEl.innerText = pendingFinalData.overallGrade + '등급';
            finalGradeEl.className = `text-2xl font-black grade-${pendingFinalData.overallGrade} px-2 py-1 rounded-lg border`;

            // 구글 시트로 최종 전송
            sendToGoogleSheets(pendingFinalData);
        }

        async function sendToGoogleSheets(data) {
            const statusEl = document.getElementById('saveStatus');
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 선생님의 구글 시트(학생기록 탭)로 데이터를 전송하고 있습니다...';
            statusEl.className = 'mt-4 text-center text-sm font-medium p-3 rounded-lg bg-blue-100 text-blue-800';

            try {
                const response = await fetch(GOOGLE_SHEET_WEBHOOK_URL, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });

                statusEl.innerHTML = '<i class="fas fa-check-circle"></i> 성공적으로 기록이 저장되었습니다!';
                statusEl.className = 'mt-4 text-center text-sm font-medium p-3 rounded-lg bg-green-100 text-green-800';
                
                // 전송 성공 시 임시 저장된 데이터 삭제
                clearLocalData(); 
            } catch (error) {
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 저장 중 통신 오류가 발생했습니다.';
                statusEl.className = 'mt-4 text-center text-sm font-medium p-3 rounded-lg bg-red-100 text-red-800';
            }
        }

        function resetForm() {
            document.getElementById('papsForm').reset();
            const results = ['res-bmi', 'res-shuttleRun', 'res-sitAndReach', 'res-gripStrength', 'res-broadJump'];
            results.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = '';
                el.classList.add('hidden');
            });
            document.getElementById('papsForm').classList.remove('hidden');
            document.getElementById('finalSection').classList.add('hidden');
            
            // 폼 초기화 시 임시 저장된 데이터도 삭제 (다음 학생 입력을 위해)
            clearLocalData();
            
            window.scrollTo(0, 0);
        }
    </script>
</body>
